<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Demo</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <header>
      <h1>個人 Portfolio Dashboard（DEMO）</h1>
      <p>美股 + 台股 + 負債 + Benchmark 比較</p>
    </header>

    <main>
      <section class="cards" id="summaryCards"></section>

      <section class="panel">
        <div>
          <h2>資產配置圓餅圖（TWD）</h2>
          <canvas id="assetPie"></canvas>
        </div>
        <div>
          <h2>投組 vs Benchmark（標準化）</h2>
          <canvas id="benchmarkLine"></canvas>
        </div>
      </section>

      <section class="panel">
        <div>
          <h2>持倉明細</h2>
          <table id="positionsTable">
            <thead>
              <tr>
                <th>市場</th>
                <th>代號</th>
                <th>名稱</th>
                <th>股數</th>
                <th>成本</th>
                <th>現值</th>
                <th>損益</th>
                <th>報酬率</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div>
          <h2>負債明細</h2>
          <table id="liabilitiesTable">
            <thead>
              <tr>
                <th>種類</th>
                <th>餘額 (TWD)</th>
                <th>利率</th>
                <th>每月應付</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
